<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout (title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">MediChain</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.14.1" defer></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">M</span>
                <span class="brand-text">MediChain</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="/inventory" class="nav-item" th:classappend="${activePage == 'inventory'} ? 'active' : ''">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
                    <span class="nav-label">Inventory</span>
                </a>
                <a href="/alerts" class="nav-item" th:classappend="${activePage == 'alerts'} ? 'active' : ''">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></span>
                    <span class="nav-label">Alerts</span>
                </a>
                <a href="/procurement" class="nav-item" th:classappend="${activePage == 'procurement'} ? 'active' : ''">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></span>
                    <span class="nav-label">Procurement</span>
                </a>
                <a href="/ngo" class="nav-item" th:classappend="${activePage == 'ngo'} ? 'active' : ''">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg></span>
                    <span class="nav-label">NGO Transfers</span>
                </a>
                <a href="/forecast" class="nav-item" th:classappend="${activePage == 'forecast'} ? 'active' : ''">
                    <span class="nav-icon"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
                    <span class="nav-label">Forecast</span>
                </a>
            </nav>
        </aside>
        <div class="main-wrapper">
            <header class="top-header">
                <span class="hospital-name" th:text="${hospitalName}">Hospital</span>
                <div class="header-right">
                    <span class="user-info" th:text="|${userName} (${userRole})|">User (Role)</span>
                    <a href="#" onclick="handleLogout(event)" class="btn btn-sm btn-outline">Logout</a>
                </div>
            </header>
            <div class="content-area" th:replace="${content}">
            </div>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="/js/app.js"></script>
    <script>
        (function() {
            var token = localStorage.getItem('accessToken');
            if (token) {
                htmx.config.defaultHeaders = { 'Authorization': 'Bearer ' + token };
            }

            document.querySelector('.sidebar').addEventListener('click', function(e) {
                var link = e.target.closest('a.nav-item');
                if (!link || link.hasAttribute('data-no-htmx')) return;
                e.preventDefault();
                var url = link.getAttribute('href');
                var main = document.querySelector('.content-area');
                if (main) {
                    htmx.ajax('GET', url, {
                        target: main,
                        swap: 'innerHTML',
                        handler: function() {
                            history.pushState({}, document.title, url);
                        }
                    });
                }
            });
        })();
    </script>
</body>
</html>
