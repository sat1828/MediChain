<html th:replace="~{fragments/layout :: layout(title=~{::title}, content=~{::#main-content})}">
<head>
    <title>NGO Transfers - MediChain</title>
</head>
<body>
    <div id="main-content">
        <div class="page-header">
            <h1 class="page-title">NGO Redistribution</h1>
            <button class="btn btn-primary" data-toggle="modal" data-target="create-ngo-modal">Create Request</button>
        </div>

        <div class="card">
            <div class="card-body" style="padding:0">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Batch#</th>
                                <th>Drug</th>
                                <th>NGO</th>
                                <th>Qty Requested</th>
                                <th>Status</th>
                                <th>Created At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="req : ${requests}">
                                <td class="font-medium" th:text="${req.drugBatch.batchNumber}">B001</td>
                                <td th:text="${req.drugBatch.drugSku.genericName}">Drug</td>
                                <td th:text="${req.requestingNgo.name}">NGO</td>
                                <td th:text="${req.quantityRequested}">100</td>
                                <td><span class="badge" th:classappend="|badge-${#strings.toLowerCase(req.status.name())}|" th:text="${req.status.name()}">DRAFT</span></td>
                                <td class="text-muted" th:text="${req.createdAt}">2025-01-01</td>
                                <td>
                                    <button class="btn btn-sm btn-success" th:if="${req.status.name() == 'DRAFT'}"
                                            th:attr="hx-post=/api/v1/ngo/redistribution/${req.id}/approve"
                                            hx-target="closest tr"
                                            hx-swap="outerHTML"
                                            hx-on::after-request="MediChain.showToast('Request approved','success')">
                                        Approve
                                    </button>
                                    <span class="text-sm text-muted" th:unless="${req.status.name() == 'DRAFT'}" th:text="${req.status.name()}">APPROVED</span>
                                </td>
                            </tr>
                            <tr th:unless="${!requests.isEmpty()}">
                                <td colspan="7"><div class="empty-state"><p>No redistribution requests yet.</p></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="create-ngo-modal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <span class="modal-title">Create NGO Redistribution Request</span>
                    <button class="modal-close" data-dismiss="modal">&times;</button>
                </div>
                <form hx-post="/api/v1/ngo/redistribution/request" hx-target="#create-ngo-modal" hx-swap="outerHTML" onsubmit="return MediChain.validateForm(this)">
                    <div class="modal-body">
                        <div class="grid-2">
                            <div class="form-group">
                                <label class="form-label" for="ngo-batch">Drug Batch</label>
                                <select class="form-select" id="ngo-batch" name="drugBatchId" required>
                                    <option value="">Select Batch</option>
                                    <option th:each="batch : ${batches}" th:value="${batch.id}" th:text="|${batch.batchNumber} - ${batch.drugSku.genericName} (${batch.quantityOnHand} avail)|">Batch</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="ngo-select">NGO</label>
                                <select class="form-select" id="ngo-select" name="ngoId" required>
                                    <option value="">Select NGO</option>
                                    <option th:each="ngo : ${ngoList}" th:value="${ngo.id}" th:text="${ngo.name}">NGO</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="ngo-qty">Quantity</label>
                                <input type="number" class="form-input" id="ngo-qty" name="quantity" min="1" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="ngo-notes">Logistics Notes</label>
                            <textarea class="form-textarea" id="ngo-notes" name="logisticsNotes" rows="2" placeholder="Pickup instructions, special handling, etc."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline" data-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
