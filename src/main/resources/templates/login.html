<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediChain - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: linear-gradient(135deg, #1a2332 0%, #2d3f57 100%);
               display: flex; justify-content: center; align-items: center;
               min-height: 100vh; padding: 20px; }
        .login-card { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      padding: 48px; width: 420px; max-width: 100%; }
        .logo { font-size: 28px; font-weight: 700; color: #2563eb; margin-bottom: 4px; letter-spacing: -0.5px; }
        .tagline { font-size: 13px; color: #6b7280; margin-bottom: 36px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 16px; border: 1.5px solid #d1d5db; border-radius: 10px;
                font-size: 14px; font-family: inherit; transition: all 0.2s; }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
        button { width: 100%; padding: 13px; background: #2563eb; color: white; border: none;
                 border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit;
                 cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #dc2626; font-size: 13px; margin-top: 16px; display: none;
                 background: #fef2f2; padding: 12px; border-radius: 8px; border: 1px solid #fecaca; }
        .error.show { display: block; }
        .footer { margin-top: 28px; text-align: center; font-size: 12px; color: #9ca3af; }
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
                   border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;
                   margin: 0 auto; }
        button.loading .spinner { display: inline-block; }
        button.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card" id="app">
        <div class="logo">MediChain</div>
        <div class="tagline">Hospital Pharmacy &amp; Drug Inventory Management</div>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="spinner"></span>
            </button>
            <div class="error" id="errorMsg">Invalid username or password</div>
        </form>
        <div class="footer">MediChain v1.0.0 &mdash; Enterprise Pharmacy Inventory System</div>
    </div>
    <script>
        function setAuthHeader() {
            var token = localStorage.getItem('accessToken');
            if (token) {
                htmx.config.defaultHeaders = {
                    'Authorization': 'Bearer ' + token
                };
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            var btn = document.getElementById('loginBtn');
            var errorEl = document.getElementById('errorMsg');
            errorEl.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value
                })
            })
            .then(function(r) {
                if (!r.ok) { throw new Error('Invalid username or password'); }
                return r.json();
            })
            .then(function(data) {
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('refreshToken', data.refreshToken);
                localStorage.setItem('tokenType', data.tokenType);
                setAuthHeader();

                var app = document.getElementById('app');
                htmx.ajax('GET', '/dashboard', {
                    target: app,
                    swap: 'innerHTML',
                    handler: function() {
                        history.pushState({}, 'Dashboard', '/dashboard');
                    }
                });
            })
            .catch(function(err) {
                errorEl.textContent = err.message || 'Login failed. Please try again.';
                errorEl.classList.add('show');
                btn.classList.remove('loading');
                btn.disabled = false;
            });

            return false;
        }

        setAuthHeader();
    </script>
</body>
</html>
