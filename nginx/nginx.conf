# MediChain nginx Configuration
# Production reverse proxy with SSL, rate limiting, security headers, and gzip

# Rate limiting zone: 10 MB shared memory, 30 requests per second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

events {
    worker_connections 1024;
}

http {
    # ------------------------------------------------------------------
    # Upstream: Spring Boot application server
    # ------------------------------------------------------------------
    upstream medichain_backend {
        server app:8080;
        keepalive 32;
    }

    # ------------------------------------------------------------------
    # MIME types & default charset
    # ------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ------------------------------------------------------------------
    # Gzip compression for JSON and HTML responses
    # ------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        application/vnd.api+json
        text/plain
        text/css
        text/html
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ------------------------------------------------------------------
    # Proxy buffer settings for large responses
    # ------------------------------------------------------------------
    proxy_buffer_size        128k;
    proxy_buffers            8 256k;
    proxy_busy_buffers_size  256k;
    proxy_max_temp_file_size 0;

    # ------------------------------------------------------------------
    # Server: HTTP redirect -> HTTPS
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ------------------------------------------------------------------
    # Server: HTTPS (SSL)
    # ------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/medichain.crt;
        ssl_certificate_key /etc/nginx/ssl/medichain.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        # ------------------------------------------------------------------
        # Security headers
        # ------------------------------------------------------------------
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=()" always;

        # ------------------------------------------------------------------
        # Actuator health check (no logging, quick response)
        # ------------------------------------------------------------------
        location /actuator/health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ------------------------------------------------------------------
        # API — rate-limited with burst
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            # CORS headers for API responses
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Max-Age       86400 always;

            # Handle preflight OPTIONS requests
            if ($request_method = OPTIONS) {
                add_header Content-Length 0;
                add_header Content-Type   text/plain;
                return 204;
            }

            proxy_pass http://medichain_backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_read_timeout 90s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ------------------------------------------------------------------
        # Default location — proxy all other requests to the backend
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://medichain_backend;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_read_timeout 90s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
